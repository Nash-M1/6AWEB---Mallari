<div class="container mt-5">
  <h2 class="text-center mb-4">📚 Books Application</h2>

  <!-- ADD FORM -->
  <div class="card p-4 mb-4 shadow-sm">
    <div class="row g-2">
      <div class="col-md-4">
        <input class="form-control" id="newBook" placeholder="Title">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="newDesc" placeholder="Description">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="newPrice" placeholder="Price">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="newAuthor" placeholder="Author">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="newGenre" placeholder="Genre">
      </div>
      <div class="col-md-4 d-grid">
        <button class="btn btn-primary" (click)="addBook()">Add Book</button>
      </div>
    </div>
  </div>

  <!-- EDIT FORM -->
  <div *ngIf="editingBook" class="card p-4 mb-4 shadow-sm">
    <h5 class="mb-3">✏️ Edit Book</h5>
    <div class="row g-2">
      <div class="col-md-4">
        <input class="form-control" id="editTitle" placeholder="Title" [value]="editingBook.title">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="editDesc" placeholder="Description" [value]="editingBook.desc">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="editPrice" placeholder="Price" [value]="editingBook.price">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="editAuthor" placeholder="Author" [value]="editingBook.author">
      </div>
      <div class="col-md-4">
        <input class="form-control" id="editGenre" placeholder="Genre" [value]="editingBook.genre">
      </div>
      <div class="col-md-4 d-flex gap-2">
        <button class="btn btn-success w-100" (click)="saveEdit()">Save</button>
        <button class="btn btn-secondary w-100" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- BOOK LIST -->
  <div *ngIf="books.length === 0" class="text-center text-muted">
    No books available
  </div>

  <div *ngFor="let book of books" class="card mb-3 shadow-sm">
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h5 class="card-title mb-1">{{ book.title }}</h5>
        <p class="mb-0 text-muted">
          📝 {{ book.desc }} &nbsp;|&nbsp;
          💰 ₱{{ book.price }} &nbsp;|&nbsp;
          ✍️ {{ book.author }} &nbsp;|&nbsp;
          🏷️ {{ book.genre }}
        </p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-warning btn-sm" (click)="startEdit(book)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="deleteBook(book.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
