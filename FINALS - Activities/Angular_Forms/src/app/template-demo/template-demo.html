<div class="card">
  <h2>Template-Driven Form</h2>
  <form #myForm="ngForm" (ngSubmit)="onSubmit()">

    <input class="input-box" type="text" name="username"
      [(ngModel)]="username" placeholder="Enter username" required>

    <input class="input-box" type="email" name="email"
      [(ngModel)]="email" placeholder="Enter email" required email>

    <input class="input-box" type="password" name="password"
      [(ngModel)]="password" placeholder="Enter password"
      required minlength="6">

    <select class="input-box" name="role" [(ngModel)]="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="Admin">Admin</option>
      <option value="User">User</option>
      <option value="Guest">Guest</option>
    </select>

    <!-- 3 Additional Fields for Activity 1 -->
    <div class="radio-group">
      <label>Gender:</label>
      <label><input type="radio" name="gender"
        [(ngModel)]="gender" value="Male"> Male</label>
      <label><input type="radio" name="gender"
        [(ngModel)]="gender" value="Female"> Female</label>
    </div>

    <div class="radio-group">
      <label>Status:</label>
      <label><input type="radio" name="status"
        [(ngModel)]="status" value="Permanent"> Permanent</label>
      <label><input type="radio" name="status"
        [(ngModel)]="status" value="Probationary"> Probationary</label>
    </div>

    <textarea class="input-box" name="comments"
      [(ngModel)]="comments"
      placeholder="Comments" rows="3"></textarea>

    <button class="btn" type="submit"
      [disabled]="myForm.invalid">Submit</button>
  </form>

  <div class="success" *ngIf="submitted">
    <p>✅ Form Submitted!</p>
    <p>Username: {{ username }}</p>
    <p>Email: {{ email }}</p>
    <p>Role: {{ role }}</p>
    <p>Gender: {{ gender }}</p>
    <p>Status: {{ status }}</p>
    <p>Comments: {{ comments }}</p>
  </div>
</div>
